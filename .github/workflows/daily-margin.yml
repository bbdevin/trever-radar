name: daily-margin

# 22:10 台北:融資融券(MI_MARGN)保底輪。17:40/21:00 的 daily-branches 已經
# 會嘗試抓 margin,但公布時間可能晚於 21:00;這支只做 margin + 重算分數,
# 不含分點爬蟲(較慢),晚一點跑當最後保底。與 daily-branches 的抓取重疊
# 是刻意的——import-daily 是 upsert,提早抓到就提早顯示,這支只補漏。

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-db
  cancel-in-progress: false

jobs:
  margin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Seed DB from release backup (cache miss)
        if: hashFiles('data/radar.db') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data || true
          if [ -f data/radar.db.gz ]; then gunzip data/radar.db.gz; fi

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Import margin (late catch-up)
        working-directory: pipeline
        run: python -m radar import-daily --datasets margin

      - name: Recompute daily scores
        working-directory: pipeline
        run: python -m radar compute-scores

      - name: Backfill score performance
        working-directory: pipeline
        run: python -m radar compute-performance

      - name: Export frontend JSON
        working-directory: pipeline
        run: python -m radar export-json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy out --project-name trever-radar --commit-dirty=true

      - name: Checkpoint SQLite WAL (merge into main file before cache/backup)
        if: always()
        run: |
          if [ -f data/radar.db ]; then
            sqlite3 data/radar.db "PRAGMA wal_checkpoint(TRUNCATE);"
          fi

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
