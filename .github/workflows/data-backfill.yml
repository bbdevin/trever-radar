name: data-backfill

# 凌晨長任務(FinMind 免費額度 600 req/hr,皆可中斷續跑):
# 每天 01:10 台北:deep-backfill(已拉深的股票自動跳過 → 日常只補新上市/缺漏,近零請求)
# 每週六 01:10:全市場還原因子重抓(除權息更新)+ 指標全歷史重算
# 與日間 workflow 共用 radar-db 併發群,不會同時寫 DB。

on:
  schedule:
    - cron: "10 17 * * *"   # 01:10 Taipei(前一日 17:10 UTC)
  workflow_dispatch:
    inputs:
      task:
        description: "deep(上市以來日K)| adjust(還原因子)| themes(概念股分類)"
        required: true
        default: "deep"
        type: choice
        options: [deep, adjust, themes, branches-history]
      sleep:
        description: "FinMind 請求間隔秒數(600/hr 上限 → ≥6)"
        required: false
        default: "6.5"

permissions:
  contents: write

concurrency:
  group: radar-db
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      PYTHONUNBUFFERED: "1"
      RADAR_FINMIND_TOKEN: ${{ secrets.RADAR_FINMIND_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Seed DB from release backup (cache miss)
        if: hashFiles('data/radar.db') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data
          gunzip data/radar.db.gz

      - name: Install pipeline deps
        run: pip install -r pipeline/requirements.txt

      - name: Deep backfill (skips already-deep; nightly cost ≈ new listings only)
        if: github.event_name == 'schedule' || inputs.task == 'deep'
        working-directory: pipeline
        run: python -m radar deep-backfill --all --sleep "${{ inputs.sleep || '6.5' }}"

      # 分點歷史深挖不排程:280分/晚×15晚=4,200分,遠超免費額度 2,000 分/月。
      # 歷史深挖走 VPS(docs/vps_backfill_plan.md §3);此步僅供手動小量補洞。
      - name: Branch history march-back (manual only; deep haul belongs on the VPS)
        if: github.event_name != 'schedule' && inputs.task == 'branches-history'
        working-directory: pipeline
        run: python -m radar backfill-branches --top 500 --days 490 --sleep 1.0 --max-minutes 90

      - name: Weekly adjustment factors + full indicator recompute (Sat)
        if: github.event_name == 'schedule'
        working-directory: pipeline
        run: |
          if [ "$(TZ=Asia/Taipei date +%u)" = "6" ]; then
            python -m radar compute-adjustments --all --sleep "${{ inputs.sleep || '6.5' }}"
            python -m radar compute-indicators --all
          fi

      - name: Adjustment factors (manual)
        if: github.event_name != 'schedule' && inputs.task == 'adjust'
        working-directory: pipeline
        run: |
          python -m radar compute-adjustments --all --sleep "${{ inputs.sleep || '6.5' }}"
          python -m radar compute-indicators --all

      - name: Concept themes
        if: github.event_name != 'schedule' && inputs.task == 'themes'
        working-directory: pipeline
        run: python -m radar import-themes

      - name: Checkpoint SQLite WAL (merge into main file before cache/backup)
        if: always()
        run: |
          if [ -f data/radar.db ]; then
            sqlite3 data/radar.db "PRAGMA wal_checkpoint(TRUNCATE);"
          fi

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}

      - name: Backup DB to release (Sat or manual)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f data/radar.db ] && { [ "$(TZ=Asia/Taipei date +%u)" = "6" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; }; then
            gzip -kf data/radar.db
            gh release upload db-backup data/radar.db.gz --clobber
          fi
