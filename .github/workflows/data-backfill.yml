name: data-backfill

# 手動觸發的長任務:全市場深歷史 / 還原因子(FinMind 免費額度 600 req/hr)。
# 與 nightly-radar 共用 concurrency group,避免同時寫 DB cache。
# 兩個任務都可中斷續跑(已完成的股票會跳過 / 冪等重算)。

on:
  workflow_dispatch:
    inputs:
      task:
        description: "deep(上市以來日K)| adjust(還原因子)"
        required: true
        default: "deep"
        type: choice
        options: [deep, adjust]
      sleep:
        description: "FinMind 請求間隔秒數(600/hr 上限 → ≥6)"
        required: false
        default: "6.5"

permissions:
  contents: write

concurrency:
  group: nightly-radar
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      PYTHONUNBUFFERED: "1"
      RADAR_FINMIND_TOKEN: ${{ secrets.RADAR_FINMIND_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore SQLite cache
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Seed DB from release backup (cache miss)
        if: hashFiles('data/radar.db') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data
          gunzip data/radar.db.gz

      - name: Install pipeline deps
        run: pip install -r pipeline/requirements.txt

      - name: Deep backfill (since IPO)
        if: inputs.task == 'deep'
        working-directory: pipeline
        run: python -m radar deep-backfill --all --sleep "${{ inputs.sleep }}"

      - name: Adjustment factors
        if: inputs.task == 'adjust'
        working-directory: pipeline
        run: python -m radar compute-adjustments --all --sleep "${{ inputs.sleep }}"

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}

      - name: Backup DB to release
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f data/radar.db ]; then
            gzip -kf data/radar.db
            gh release upload db-backup data/radar.db.gz --clobber
          fi
