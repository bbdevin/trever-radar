name: data-backfill

# 凌晨長任務(FinMind 免費額度 600 req/hr,皆可中斷續跑):
# 每天 01:10 台北:deep-backfill(已拉深的股票自動跳過 → 日常只補新上市/缺漏,近零請求)
# 週六全市場還原因子重抓 + 指標全歷史重算已於 2026-07-10 停用,改在使用者 VPS 執行後
# 依 docs/vps_backfill_plan.md Step 4 上傳 release + 清 cache 回灌雲端;雲端保留手動
# task=adjust 作為 fallback(注意與 VPS 共用同一 FinMind token 額度,勿同時跑)。
# 與日間 workflow 共用 radar-db 併發群,不會同時寫 DB。

on:
  # 01:10 Taipei nightly trigger moved off native `schedule:` to an
  # external Cloudflare Worker cron calling `workflow_dispatch` (default
  # inputs: task=deep) at the same wall clock time. See
  # cloudflare-trigger/README.md. Steps below now key off `inputs.task`
  # instead of `github.event_name == 'schedule'` since schedule no longer
  # exists as a trigger.
  workflow_dispatch:
    inputs:
      task:
        description: "deep(上市以來日K)| adjust(還原因子)| themes(概念股分類)| indicators-only(純算指標)"
        required: true
        default: "deep"
        type: choice
        options: [deep, adjust, themes, branches-history, indicators-only, backfill-recent, branch-stats, backfill-branches-recent, debug-query]
      sleep:
        description: "FinMind 請求間隔秒數(600/hr 上限 → ≥6)"
        required: false
        default: "6.5"

permissions:
  contents: write

concurrency:
  group: radar-db
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      PYTHONUNBUFFERED: "1"
      RADAR_FINMIND_TOKEN: ${{ secrets.RADAR_FINMIND_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Seed DB from release backup (cache miss)
        if: hashFiles('data/radar.db') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data
          gunzip data/radar.db.gz

      - name: Install pipeline deps
        run: pip install -r pipeline/requirements.txt

      - name: Deep backfill (skips already-deep; nightly cost ≈ new listings only)
        if: inputs.task == 'deep'
        working-directory: pipeline
        run: python -m radar deep-backfill --all --sleep "${{ inputs.sleep || '6.5' }}"

      # 分點歷史深挖不排程:280分/晚×15晚=4,200分,遠超免費額度 2,000 分/月。
      # 歷史深挖走 VPS(docs/vps_backfill_plan.md §3);此步僅供手動小量補洞。
      - name: Branch history march-back (manual only; deep haul belongs on the VPS)
        if: inputs.task == 'branches-history'
        working-directory: pipeline
        run: python -m radar backfill-branches --top 500 --days 490 --sleep 1.0 --max-minutes 90

      # 週六全重算步驟已移除(2026-07-10):改由 VPS 跑後回灌;手動 fallback 用 task=adjust。

      - name: Adjustment factors (manual)
        if: inputs.task == 'adjust'
        working-directory: pipeline
        run: |
          python -m radar compute-adjustments --all --sleep "${{ inputs.sleep || '6.5' }}"
          python -m radar compute-indicators --all

      - name: Recompute indicators only (no API calls)
        if: inputs.task == 'indicators-only'
        working-directory: pipeline
        run: python -m radar compute-indicators --all

      - name: "Recent gap-fill (last 10 trading days: quotes → insti → margin → indicators → scores)"
        if: inputs.task == 'backfill-recent'
        working-directory: pipeline
        run: |
          python -m radar backfill --days 10 --datasets quotes,insti,margin
          python -m radar import-daily --date 20260709 --datasets insti,margin || true
          python -m radar import-daily --date 20260710 --datasets insti,margin || true
          python -m radar import-daily --date 20260713 --datasets insti,margin || true
          python -m radar aggregate-warrants
          python -m radar compute-indicators --all --days 12
          python -m radar compute-scores

      - name: "Branch stats (compute-branch-stats; no API; safe on 7 GB Actions RAM)"
        if: inputs.task == 'branch-stats'
        working-directory: pipeline
        run: python -m radar compute-branch-stats

      - name: "Backfill Branches Recent (Top 500 for 7/9, 7/10, 7/13 + compute-branch-stats)"
        if: inputs.task == 'backfill-branches-recent'
        working-directory: pipeline
        run: |
          python -m radar import-branch-trades --date 20260709 --top 500 --sleep 1.0 || true
          python -m radar import-branch-trades --date 20260710 --top 500 --sleep 1.0 || true
          python -m radar import-branch-trades --date 20260713 --top 500 --sleep 1.0 || true
          python -m radar compute-branch-stats

      - name: "Debug query (read-only; check per-stock branch_trades freshness + score rank)"
        if: inputs.task == 'debug-query'
        working-directory: pipeline
        run: |
          python -c "
          import sqlite3, os
          c = sqlite3.connect('../data/radar.db')
          print('db file size bytes:', os.path.getsize('../data/radar.db'))
          print('branch_trades: MIN(date)=%s MAX(date)=%s COUNT(DISTINCT date)=%s total_rows=%s' % c.execute(
              'SELECT MIN(date), MAX(date), COUNT(DISTINCT date), COUNT(*) FROM branch_trades').fetchone())
          print('branch_trades: COUNT(DISTINCT stock_id)=%s' % c.execute(
              'SELECT COUNT(DISTINCT stock_id) FROM branch_trades').fetchone())
          print('total listed stocks/etf in stocks table:', c.execute(
              \"SELECT COUNT(*) FROM stocks WHERE type IN ('stock','etf')\").fetchone()[0])
          rows_per_stock = c.execute(
              'SELECT stock_id, COUNT(*) FROM branch_trades GROUP BY stock_id ORDER BY COUNT(*) DESC LIMIT 3').fetchall()
          print('top row-count stocks (sample):', rows_per_stock)
          import statistics
          counts = [r[0] for r in c.execute('SELECT COUNT(*) FROM branch_trades GROUP BY stock_id').fetchall()]
          print(f'rows-per-stock: n={len(counts)} median={statistics.median(counts)} mean={statistics.mean(counts):.0f} max={max(counts)}')
          dn, dbid, avglen, avgblen = c.execute('SELECT COUNT(DISTINCT branch_name), COUNT(DISTINCT broker_id), AVG(LENGTH(branch_name)), AVG(LENGTH(broker_id)) FROM branch_trades').fetchone()
          print(f'branch_name distinct={dn} avg_len={avglen:.1f} broker_id distinct={dbid} avg_len={avgblen}')
          print('branch_trades table+index bytes (dbstat):', list(c.execute(\"SELECT name, SUM(pgsize) FROM dbstat WHERE name LIKE 'branch_trades%' GROUP BY name\")))
          for sid in ('2476', '2359'):
              row = c.execute('SELECT MAX(date) FROM branch_trades WHERE stock_id=?', (sid,)).fetchone()
              print(f'{sid} branch_trades max date: {row[0]}')
              for d in ('2026-07-09', '2026-07-10', '2026-07-13'):
                  r = c.execute('''SELECT rowid FROM (
                      SELECT stock_id, RANK() OVER (ORDER BY final DESC) rk
                      FROM daily_scores WHERE date=?) WHERE stock_id=?''', (d, sid)).fetchone()
                  rk = c.execute('''SELECT rk FROM (
                      SELECT stock_id, RANK() OVER (ORDER BY final DESC) rk
                      FROM daily_scores WHERE date=?) WHERE stock_id=?''', (d, sid)).fetchone()
                  print(f'  {sid} score rank on {d}: {rk}')
              rows = c.execute('SELECT branch_name, net_lots FROM branch_trades WHERE stock_id=? AND date=(SELECT MAX(date) FROM branch_trades WHERE stock_id=?) ORDER BY net_lots DESC LIMIT 5', (sid, sid)).fetchall()
              print(f'  {sid} latest branch rows: {rows}')
          "

      - name: Concept themes
        if: inputs.task == 'themes'
        working-directory: pipeline
        run: python -m radar import-themes

      - name: Checkpoint SQLite WAL (merge into main file before cache/backup)
        if: always()
        run: |
          if [ -f data/radar.db ]; then
            sqlite3 data/radar.db "PRAGMA wal_checkpoint(TRUNCATE);"
          fi

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}

      - name: Backup DB to release (Sat)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f data/radar.db ] && [ "$(TZ=Asia/Taipei date +%u)" = "6" ]; then
            gzip -kf data/radar.db
            gh release upload db-backup data/radar.db.gz --clobber
          fi
