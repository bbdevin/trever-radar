name: daily-insti

# 16:10 台北:法人買賣超 ~16:00 公布;權證主檔同時段更新 → 匯入後重算分數並部署。

on:
  schedule:
    - cron: "10 8 * * 1-5"   # 16:10 Taipei
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-db
  cancel-in-progress: false

jobs:
  insti:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Seed DB from release backup (cache miss)
        if: hashFiles('data/radar.db') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data || true
          if [ -f data/radar.db.gz ]; then gunzip data/radar.db.gz; fi

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Import institutional flows
        working-directory: pipeline
        run: python -m radar import-daily --datasets insti

      - name: Warrant master refresh
        working-directory: pipeline
        run: python -m radar import-warrant-master

      - name: Recompute daily scores
        working-directory: pipeline
        run: python -m radar compute-scores

      - name: Export frontend JSON
        working-directory: pipeline
        run: python -m radar export-json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy out --project-name trever-radar --commit-dirty=true

      - name: Checkpoint SQLite WAL (merge into main file before cache/backup)
        if: always()
        run: |
          if [ -f data/radar.db ]; then
            sqlite3 data/radar.db "PRAGMA wal_checkpoint(TRUNCATE);"
          fi

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
