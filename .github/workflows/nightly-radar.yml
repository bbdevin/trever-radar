name: nightly-radar

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 9 * * 1-5"   # 17:30 台北:日K/權證已出,法人 16:00、融資券 16:30 後
    - cron: "0 13 * * 1-5"   # 21:00 台北:補當日較晚公布或首跑失敗的資料
  workflow_dispatch:

permissions:
  contents: write            # 週五備份 DB 到 release

concurrency:
  group: nightly-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      RADAR_FINMIND_TOKEN: ${{ secrets.RADAR_FINMIND_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore SQLite cache
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Seed DB from release backup (cache miss)
        if: hashFiles('data/radar.db') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data
          gunzip data/radar.db.gz

      - name: Install pipeline deps
        run: pip install -r pipeline/requirements.txt

      - name: Import today's data
        if: github.event_name != 'push'
        working-directory: pipeline
        run: python -m radar import-daily

      - name: Warrant master + daily aggregate
        if: github.event_name != 'push'
        working-directory: pipeline
        run: |
          python -m radar import-warrant-master
          python -m radar aggregate-warrants --date "$(TZ=Asia/Taipei date +%Y%m%d)"

      - name: Compute technical indicators
        if: github.event_name != 'push'   # 全歷史重算,push 部署不需要
        working-directory: pipeline
        run: python -m radar compute-indicators --all

      - name: Compute daily scores
        working-directory: pipeline
        run: python -m radar compute-scores

      - name: Backfill score performance
        working-directory: pipeline
        run: python -m radar compute-performance

      - name: Branch trades (fubon public page, score-pool top 80)
        if: github.event_name != 'push'
        working-directory: pipeline
        run: python -m radar import-branch-trades --top 80

      - name: Weekly concept-theme refresh (Mon)
        if: github.event_name != 'push'
        working-directory: pipeline
        run: |
          if [ "$(TZ=Asia/Taipei date +%u)" = "1" ]; then
            python -m radar import-themes
          fi

      - name: Export frontend JSON
        working-directory: pipeline
        run: python -m radar export-json

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create trever-radar --production-branch main 2>/dev/null || true
          npx wrangler pages deploy out --project-name trever-radar --commit-dirty=true

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}

      - name: Weekly DB backup to release (Fri or manual run)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f data/radar.db ] && { [ "$(date +%u)" = "5" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; }; then
            gzip -kf data/radar.db
            gh release create db-backup --notes "rolling SQLite backup" 2>/dev/null || true
            gh release upload db-backup data/radar.db.gz --clobber
          fi
