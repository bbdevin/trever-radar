name: daily-market

on:
  schedule:
    - cron: "30 7 * * 1-5"   # 15:30 Taipei: Quotes, Insti
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-db
  cancel-in-progress: false

jobs:
  market:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      RADAR_FINMIND_TOKEN: ${{ secrets.RADAR_FINMIND_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Seed DB from release backup
        if: hashFiles('data/radar.db') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data || true
          if [ -f data/radar.db.gz ]; then gunzip data/radar.db.gz; fi

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Import today's data (Quotes)
        working-directory: pipeline
        run: python -m radar import-daily --datasets quotes

      - name: Import today's data (Insti)
        working-directory: pipeline
        run: python -m radar import-daily --datasets insti

      - name: Compute technical indicators (incremental)
        working-directory: pipeline
        run: python -m radar compute-indicators --all --days 5

      - name: Weekly concept-theme refresh (Mon)
        working-directory: pipeline
        run: |
          if [ "$(TZ=Asia/Taipei date +%u)" = "1" ]; then
            python -m radar import-themes
          fi

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}

# DB 備份集中在 daily-branches(當日最後一跑)週五執行;此處不重複 gzip 1GB 上傳
