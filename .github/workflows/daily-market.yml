name: daily-market

# 14:10 台北:日K/權證成交 14:00 後公布 → 收盤閃電更新,資料日當天就變今天。
# 法人/融資券/分點尚未公布 → 前端 freshness 標「暫用前一日」,由後續 workflow 分批補。

on:
  # 14:10 Taipei trigger moved off native `schedule:` (observed delays of
  # 2.5-3.5h under Actions load) to an external Cloudflare Worker cron
  # calling `workflow_dispatch` at the same wall clock time. See
  # cloudflare-trigger/README.md.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-db
  cancel-in-progress: false

jobs:
  market:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      RADAR_FINMIND_TOKEN: ${{ secrets.RADAR_FINMIND_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Seed DB from release backup (cache miss)
        if: hashFiles('data/radar.db') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data || true
          if [ -f data/radar.db.gz ]; then gunzip data/radar.db.gz; fi

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Import today's quotes (stocks + warrants)
        working-directory: pipeline
        run: python -m radar import-daily --datasets quotes

      - name: Aggregate warrants for today
        working-directory: pipeline
        run: python -m radar aggregate-warrants --date "$(TZ=Asia/Taipei date +%Y%m%d)"

      - name: Compute technical indicators (incremental)
        working-directory: pipeline
        run: python -m radar compute-indicators --all --days 5

      - name: Compute daily scores
        working-directory: pipeline
        run: python -m radar compute-scores

      - name: Weekly concept-theme refresh (Mon)
        working-directory: pipeline
        run: |
          if [ "$(TZ=Asia/Taipei date +%u)" = "1" ]; then
            python -m radar import-themes
          fi

      - name: Export frontend JSON
        working-directory: pipeline
        run: python -m radar export-json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy out --project-name trever-radar --commit-dirty=true

      - name: Checkpoint SQLite WAL (merge into main file before cache/backup)
        if: always()
        run: |
          if [ -f data/radar.db ]; then
            sqlite3 data/radar.db "PRAGMA wal_checkpoint(TRUNCATE);"
          fi

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}

# DB 備份集中在 daily-branches(當日最後一跑)週五執行
