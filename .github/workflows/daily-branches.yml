name: daily-branches

on:
  schedule:
    - cron: "30 10 * * 1-5"  # 18:30 Taipei: Branches, Margin, Compute, Deploy
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-db
  cancel-in-progress: false

jobs:
  branches_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Seed DB from release backup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data || true
          if [ -f data/radar.db.gz ]; then gunzip data/radar.db.gz; fi

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Import today's data (Margin)
        working-directory: pipeline
        run: python -m radar import-daily --datasets margin

      - name: Seed tracking branches
        working-directory: pipeline
        run: python -m radar seed-branches

      - name: Branch trades (fubon public page, score-pool top 80)
        working-directory: pipeline
        run: python -m radar import-branch-trades --top 80

      - name: Compute branch stats
        working-directory: pipeline
        run: python -m radar compute-branch-stats

      - name: Compute daily scores
        working-directory: pipeline
        run: python -m radar compute-scores

      - name: Backfill score performance
        working-directory: pipeline
        run: python -m radar compute-performance

      - name: Export frontend JSON
        working-directory: pipeline
        run: python -m radar export-json

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create trever-radar --production-branch main 2>/dev/null || true
          npx wrangler pages deploy out --project-name trever-radar --commit-dirty=true

      - name: Daily DB backup to release
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f data/radar.db ]; then
            gzip -kf data/radar.db
            gh release create db-backup --notes "rolling SQLite backup" 2>/dev/null || true
            gh release upload db-backup data/radar.db.gz --clobber
          fi
