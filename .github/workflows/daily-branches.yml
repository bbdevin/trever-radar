name: daily-branches

on:
  schedule:
    - cron: "40 9 * * 1-5"   # 17:40 Taipei: 融資券/分點已公布 → 全量計算 + 部署
    - cron: "0 13 * * 1-5"   # 21:00 Taipei: 補晚公布或前段失敗的資料
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-db
  cancel-in-progress: false

jobs:
  branches_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache/restore@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: radar-db-

      - name: Seed DB from release backup (cache miss)
        if: hashFiles('data/radar.db') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-backup --pattern radar.db.gz --dir data || true
          if [ -f data/radar.db.gz ]; then gunzip data/radar.db.gz; fi

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Import margin + catch up institutional
        working-directory: pipeline
        run: python -m radar import-daily --datasets insti,margin

      - name: Seed tracking branches
        working-directory: pipeline
        run: python -m radar seed-branches

      - name: Branch trades (MoneyDJ mirrors, score-pool top 500)
        working-directory: pipeline
        run: python -m radar import-branch-trades --top 500 --sleep 1.0

      - name: Compute branch stats
        working-directory: pipeline
        run: python -m radar compute-branch-stats

      - name: Compute daily scores
        working-directory: pipeline
        run: python -m radar compute-scores

      - name: Backfill score performance
        working-directory: pipeline
        run: python -m radar compute-performance

      - name: Export frontend JSON
        working-directory: pipeline
        run: python -m radar export-json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create trever-radar --production-branch main 2>/dev/null || true
          npx wrangler pages deploy out --project-name trever-radar --commit-dirty=true

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}

      - name: Weekly DB backup to release (Fri or manual)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f data/radar.db ] && { [ "$(TZ=Asia/Taipei date +%u)" = "5" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; }; then
            gzip -kf data/radar.db
            gh release create db-backup --notes "rolling SQLite backup" 2>/dev/null || true
            gh release upload db-backup data/radar.db.gz --clobber
          fi
